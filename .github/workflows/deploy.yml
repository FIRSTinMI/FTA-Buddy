name: Deploy

on:
    push:
        branches: [main, dev]
    workflow_dispatch:

# Build the image on the self-hosted NAS runner (off the cloud box), push it to
# the Forgejo registry, then have Coolify pull + deploy it. Same Dockerfile for
# every branch so dev and prod are built identically (tag = branch name).
jobs:
    build:
        runs-on: [self-hosted, nas]
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Log in to the Forgejo registry
              run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login git.filipkin.com -u "${{ secrets.REGISTRY_USER }}" --password-stdin

            - name: Build and push image
              run: |
                  set -eux
                  IMAGE=git.filipkin.com/filip/fta-buddy
                  docker build -t "$IMAGE:${{ github.ref_name }}" -t "$IMAGE:${{ github.sha }}" .
                  docker push "$IMAGE:${{ github.ref_name }}"
                  docker push "$IMAGE:${{ github.sha }}"

    deploy:
        needs: build
        runs-on: [self-hosted, nas]
        steps:
            - name: Deploy via Coolify (pulls the new image)
              run: |
                  set -u
                  if [ "${{ github.ref_name }}" = "main" ]; then APP="${{ secrets.INSTANCE_A_UUID }}"; else APP="${{ secrets.DEV_UUID }}"; fi
                  if [ -z "$APP" ]; then echo "No Coolify app configured for ${{ github.ref_name }}; skipping deploy."; exit 0; fi
                  dep=$(curl -s "https://panel.filipkin.com/api/v1/deploy?uuid=$APP&force=false" \
                    -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" | grep -o '"deployment_uuid":"[^"]*"' | head -1 | cut -d'"' -f4)
                  echo "Triggered Coolify deploy for $APP -> $dep"
                  for i in $(seq 1 90); do
                    s=$(curl -s "https://panel.filipkin.com/api/v1/deployments/$dep" \
                      -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" | grep -o '"status":"[^"]*"' | head -1 | cut -d'"' -f4)
                    echo "  attempt $i: $s"
                    [ "$s" = "finished" ] && exit 0
                    { [ "$s" = "failed" ] || [ "$s" = "error" ]; } && { echo "deployment failed"; exit 1; }
                    sleep 10
                  done
                  echo "timed out waiting for deployment"; exit 1

            - name: Notify Discord (success)
              if: success()
              run: |
                  curl -s -X POST ${{ secrets.DISCORD_WEBHOOK }} -H "Content-Type: application/json" \
                    -d '{"embeds":[{"title":"✅ FTA Buddy Deployed","description":"Built on the NAS runner; Coolify pulled the image.","color":3066993}]}'

            - name: Notify Discord (failure)
              if: failure()
              run: |
                  curl -s -X POST ${{ secrets.DISCORD_WEBHOOK }} -H "Content-Type: application/json" \
                    -d '{"embeds":[{"title":"❌ FTA Buddy Deploy Failed","description":"Check [GitHub Actions](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).","color":15158332}]}'
