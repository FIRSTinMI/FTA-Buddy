name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy instance A
        run: |
          curl -s -X POST https://panel.filipkin.com/api/v1/applications/${{ secrets.INSTANCE_A_UUID }}/start \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json"

      - name: Wait for instance A to become healthy
        run: |
          echo "Waiting for instance A..."
          for i in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://a.ftabuddy.com/)
            if [ "$status" = "200" ]; then
              echo "Instance A healthy after $i attempts"
              exit 0
            fi
            echo "Attempt $i: got $status, retrying in 10s..."
            sleep 10
          done
          echo "Instance A failed to become healthy after 5 minutes"
          exit 1

      - name: Deploy instance B
        run: |
          curl -s -X POST https://panel.filipkin.com/api/v1/applications/${{ secrets.INSTANCE_B_UUID }}/start \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json"

      - name: Wait for instance B to become healthy
        run: |
          echo "Waiting for instance B..."
          for i in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://b.ftabuddy.com/)
            if [ "$status" = "200" ]; then
              echo "Instance B healthy after $i attempts"
              exit 0
            fi
            echo "Attempt $i: got $status, retrying in 10s..."
            sleep 10
          done
          echo "Instance B failed to become healthy after 5 minutes"
          exit 1